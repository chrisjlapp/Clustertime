# Clustertime — Master Node Configuration
# The master uses the system clock as a free-running PTP source (clockClass 135).
# Relay nodes connect via PTPv2 unicast.

mode: master
interface: eth0      # Network interface to serve PTP on
# Optional: serve PTP on multiple interfaces from one master ptp4l instance.
# master_interfaces:
#   - eth0
#   - eth1
# Optional per-interface overrides for master mode:
# master_interface_options:
#   eth0:
#     inhibit_multicast_service: false
#   eth1:
#     inhibit_multicast_service: true
log_level: INFO

ptp:
  domain: 0           # PTP domain number (0–127)
  transport: UDPv4
  # Timestamping mode: auto|hardware|software
  # auto = use hardware when available on the interface, else software.
  time_stamping: auto
  # Timeout (seconds) for waiting on tx timestamp before treating packet as failed.
  tx_timestamp_timeout: 10
  # TTL/hop-limit used by ptp4l for multicast UDP PTP packets.
  multicast_ttl: 1
  # TTL/hop-limit hint for unicast UDP PTP packets.
  unicast_ttl: 1
  # Raspberry Pi hybrid mode:
  # when true, master interface is forced to software timestamping on Pi.
  rpi_hybrid_ts: false
  # Master BMCA priorities (0..255, lower wins)
  master_priority1: 128
  master_priority2: 128
  # PTP minor version: 0 (PTPv2.0, default) or 1 (PTPv2.1)
  minor_version: 0
  sync_interval: -3   # log2 seconds — -3 = 8 sync messages/sec
  announce_interval: 1
  min_delay_req_interval: 0
  unicast_req_duration: 300   # seconds before relay must renew unicast grant
